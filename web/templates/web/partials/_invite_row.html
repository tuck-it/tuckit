<div class="invite-row" id="invite-{{ inv.id }}">
  <span>{{ inv.email }} · {{ inv.get_role_display }}</span>
  {% if link %}<input readonly value="{{ link }}" onclick="this.select()">{% endif %}
  <button class="ghost" type="button"
          hx-post="{% url 'web:invite_cancel' inv.id %}"
          hx-target="closest .invite-row" hx-swap="outerHTML"
          hx-confirm="이 초대를 취소할까요?">취소</button>
</div>
