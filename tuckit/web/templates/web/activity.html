{% extends "web/base.html" %}
{% block main %}
  <header class="page-head"><div class="page-head-l"><h1 class="page-title">Activity</h1></div></header>
  <section class="group">
    {% if events %}
      <div class="panel">
        {% for event in events %}{% include "web/partials/_activity_row.html" %}{% endfor %}
      </div>
    {% else %}
      <div class="empty muted">No activity yet</div>
    {% endif %}
  </section>
{% endblock %}
