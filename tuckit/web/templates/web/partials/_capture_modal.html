<div class="capture-overlay" x-show="cap" x-cloak
     x-on:keydown.escape.window="cap=false"
     x-on:click.self="cap=false">
  <form class="capture-modal" hx-post="{% url 'web:capture' %}" hx-swap="none"
        hx-on::after-request="this.reset(); $refs.captureInput.focus()">
    <input name="title" class="capture-input" placeholder="빠르게 기록… (Enter로 계속 기록, Esc로 닫기)" x-ref="captureInput"
           x-on:keydown.escape="cap=false" autofocus>
  </form>
</div>
