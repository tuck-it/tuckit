{% load web_extras %}
<form class="triage-row" hx-post="{% wurl 'web:slice_triage' slice.id %}"
      hx-trigger="change" hx-target="closest .triage-row" hx-swap="outerHTML">
  {% include "web/partials/_status_dot.html" with status=slice.status %}
  <span class="row-title">{{ slice.title }}</span>
  <span class="row-meta">{% if slice.source == 'agent' %}agent{% else %}you{% endif %} · {{ slice.created_at|timesince }}</span>
  <div class="triage-controls">
    <label class="triage-field">Area
      <select name="area_id" class="triage-select">
        <option value="" selected disabled>Assign area</option>
        {% for a in areas %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
      </select>
    </label>
    <label class="triage-field">Status
      <select name="status" class="triage-select">
        {% for st in statuses %}<option value="{{ st }}" {% if st == slice.status %}selected{% endif %}>{{ st }}</option>{% endfor %}
      </select>
    </label>
  </div>
</form>
