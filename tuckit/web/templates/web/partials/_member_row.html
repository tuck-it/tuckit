<tr id="member-{{ m.id }}">
  <td>
    <div class="member-cell">
      <span class="avatar">{{ m.user.email|slice:":1"|upper }}</span>
      <div><div class="nm">{{ m.user.email }}</div>{% if m.user == request.user %}<div class="sub">You</div>{% endif %}</div>
    </div>
  </td>
  <td><span class="role-badge role-badge--{{ m.role }}">{{ m.get_role_display }}</span></td>
  <td><span class="status-pill status-pill--active">Active</span></td>
  <td class="member-table-actions">
    {% if can_owner and m.user != request.user or can_admin and m.role != 'owner' and m.user != request.user %}
      <button class="btn" type="button" data-modal="small"
              hx-get="{% url 'web:org_member_manage' org.slug m.id %}" hx-target="#detail-modal">Manage</button>
    {% endif %}
  </td>
</tr>
