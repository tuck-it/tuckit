{% load web_extras %}
{% with lid=listen_id|default:'gs-listen' %}
<div id="{{ lid }}" class="gs-listen"
     hx-get="{% wurl 'web:onboarding_agent_check' %}?since={{ agent_baseline }}&lid={{ lid }}"
     hx-trigger="every 3s" hx-target="#{{ lid }}" hx-swap="outerHTML">
  <span class="gs-radar" aria-hidden="true"></span>
  <span><b>Listening for your agent…</b> ask it to capture or create something.</span>
</div>
{% endwith %}
