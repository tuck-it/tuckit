<tr id="invite-{{ inv.id }}">
  <td>
    <div class="member-cell">
      <span class="avatar avatar--pending">{{ inv.email|slice:":1"|upper }}</span>
      <div><div class="nm">{{ inv.email }}</div></div>
    </div>
  </td>
  <td><span class="role-badge role-badge--{{ inv.role }}">{{ inv.get_role_display }}</span></td>
  <td><span class="status-pill status-pill--pending">Invited</span></td>
  <td class="member-table-actions">
    <button class="btn" type="button" data-modal="small"
            hx-get="{% url 'web:invite_manage' org.slug inv.id %}" hx-target="#detail-modal">Manage</button>
  </td>
</tr>
