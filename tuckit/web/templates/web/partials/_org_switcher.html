{% load web_extras %}
{% if current_org %}
<div class="ws-switch-wrap side-top-ws" x-data="{open: false}" x-on:keydown.escape="open = false">
  <button type="button" class="ws-switch" x-on:click="open = !open"
          :aria-expanded="open.toString()" aria-haspopup="menu">
    <span class="ws-mono">{{ current_org.name|first|upper }}</span>
    <span class="ws-labels">
      <span class="ws-name">{{ current_org.name }}</span>
    </span>
    {% icon "chevron" "icon ws-chev" %}
  </button>

  <div class="ws-menu" x-show="open" x-transition.origin.top
       x-on:click.outside="open = false" role="menu" style="display:none">
    {% for org in switchable_orgs %}
      <a href="{% url 'web:home' org.slug %}"
         class="ws-menu-item{% if org.id == current_org.id %} ws-menu-item--active{% endif %}" role="menuitem">
        <span class="ws-menu-name">{{ org.name }}</span>
        {% if org.id == current_org.id %}{% icon "check" "icon ws-check" %}{% endif %}
      </a>
    {% endfor %}
    <div class="ws-menu-sep"></div>
    <a class="ws-menu-item ws-menu-settings" href="{% url 'web:orgs' %}" role="menuitem">
      {% icon "settings" %}<span>All organizations</span>
    </a>
    <a class="ws-menu-item ws-menu-settings"
       href="{% url 'web:settings_root' current_org.slug %}" role="menuitem">
      {% icon "settings" %}<span>Settings</span>
    </a>
  </div>
</div>
{% endif %}
