{% load web_extras %}
{% if items %}
  <div class="panel">
    {% for it in items %}
      {% attention_label it as lbl %}
      {% include "web/partials/_slice_row.html" with slice=it.slice reason=lbl %}
    {% endfor %}
  </div>
{% else %}
  <div class="all-clear">{% icon "check" "icon icon-clear" %}<span>놓친 것 없어요 — 다 챙겼습니다</span></div>
{% endif %}
