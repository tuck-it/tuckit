{% load web_extras %}
{% if items %}
  <div class="panel">
    {% for it in items %}
      {% attention_label it as lbl %}
      {% include "web/partials/_slice_row.html" with slice=it.slice reason=lbl %}
    {% endfor %}
  </div>
{% else %}
  <div class="all-clear">{% icon "check" "icon icon-clear" %}<span>Nothing needs your attention right now.</span></div>
{% endif %}
