{% load web_extras %}
<div id="area-nav"{% if oob %} hx-swap-oob="true"{% endif %}>
  {% for a in areas %}
    <a class="nav{% if request.resolver_match.url_name == 'area' and request.resolver_match.kwargs.slug == a.slug %} nav--active{% endif %}"
       href="{% url 'web:area' a.slug %}">{% icon "area" %}<span class="nav-label">{{ a.name }}</span></a>
  {% endfor %}
</div>
