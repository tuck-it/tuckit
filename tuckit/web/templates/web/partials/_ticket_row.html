{% load web_extras %}
<form class="triage-row" hx-post="{% wurl 'web:ticket_promote' ticket.id %}"
      hx-trigger="change" hx-target="closest .triage-row" hx-swap="outerHTML">
  <span class="row-title">{{ ticket.title }}</span>
  <span class="source-badge{% if ticket.source == 'agent' %} is-agent{% endif %}">{% if ticket.source == 'agent' %}agent{% else %}you{% endif %}</span>
  <span class="row-meta">{{ ticket.created_at|timesince }}</span>
  <div class="triage-controls">
    <label class="triage-field">Area
      <select name="area_id" class="triage-select">
        <option value="" selected disabled>Assign area</option>
        {% for a in areas %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
      </select>
    </label>
    <label class="triage-field">Status
      <select name="status" class="triage-select">
        {% for st in statuses %}<option value="{{ st }}">{{ st }}</option>{% endfor %}
      </select>
    </label>
  </div>
</form>
