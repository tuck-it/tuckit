{% extends "web/settings_base.html" %}
{% block settings_title %}Workspace · Shipped board{% endblock %}
{% block settings_content %}
<div class="settings-title">Shipped board</div>
<section class="group settings-section">
  <div class="settings-row">
    <div class="settings-row-text">
      <div class="settings-row-label">Shipped shown on board</div>
      <div class="settings-row-desc">How many completed slices the Board tab keeps visible before "View all shipped".</div>
    </div>
    <div class="settings-row-control">
      <form class="shipped-board-prefs" hx-post="{% url 'web:shipped_board_prefs' workspace.org.slug workspace.slug %}" hx-swap="none"
            hx-on::after-request="showToast(event.detail.successful ? 'Saved.' : event.detail.xhr.responseText, event.detail.successful ? 'ok' : 'err')">
        <span class="settings-select"><select name="mode">
          <option value="count"{% if workspace.shipped_board_mode == 'count' %} selected{% endif %}>Most recent (count)</option>
          <option value="days"{% if workspace.shipped_board_mode == 'days' %} selected{% endif %}>Last N days</option>
        </select></span>
        <input name="limit" type="number" min="1" max="365" value="{{ workspace.shipped_board_limit }}">
        <button type="submit" class="btn">Save</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
