{% extends "web/settings_base.html" %}
{% block settings_title %}Organization · Danger zone{% endblock %}
{% block settings_content %}
{% if can_owner %}
<div class="settings-title danger">Danger zone</div>
<section class="group settings-section settings-section--danger">
  <form hx-post="{% url 'web:org_delete' org.slug %}" hx-confirm="The organization and all its workspaces will be deleted. Continue?">
    <button type="submit" class="btn danger">Delete organization</button>
  </form>
</section>
{% else %}
<div class="hint">Only the organization owner can delete it.</div>
{% endif %}
{% endblock %}
