{% extends "web/settings_base.html" %}
{% load web_extras %}
{% block settings_title %}Workspace · General{% endblock %}
{% block settings_content %}
<div class="settings-title">General</div>
<section class="group settings-section">
  <div class="settings-row">
    <div class="settings-row-text">
      <div class="settings-row-label">Workspace name</div>
      <div class="settings-row-desc">Shown across tuckit and in the workspace switcher.</div>
    </div>
    <div class="settings-row-control">
      <div class="settings-name" x-data="{editing: false, name: '{{ workspace.name|escapejs }}', saved: '{{ workspace.name|escapejs }}'}">
        <span class="settings-name-display" x-show="!editing" x-on:click="editing = true">
          <span x-text="name"></span>{% icon "edit" %}
        </span>
        <input name="name" class="title-edit" x-show="editing" x-cloak x-model="name"
               hx-post="{% url 'web:workspace_rename' workspace.org.slug workspace.slug %}" hx-trigger="blur, keydown[key=='Enter']"
               hx-vals="js:{name: name}" hx-swap="none"
               hx-on::after-request="if(event.detail.successful){saved=name}else{name=saved; showToast(event.detail.xhr.responseText,'err')}"
               x-on:keydown.enter="editing = false" x-on:blur="editing = false">
      </div>
    </div>
  </div>
</section>
{% endblock %}
