{% extends "web/settings_base.html" %}
{% block settings_title %}Account · Profile{% endblock %}
{% block settings_content %}
<div class="settings-title">General</div>
<section class="group settings-section">
  <div class="settings-row">
    <div class="settings-row-text">
      <div class="settings-row-label">Email</div>
      <div class="settings-row-desc">Used to sign in to tuckit.</div>
    </div>
    <div class="settings-row-control"><span class="settings-value">{{ request.user.email }}</span></div>
  </div>
</section>
{% endblock %}
