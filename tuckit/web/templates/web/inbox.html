{% extends "web/base.html" %}
{% block main %}
  <div class="topbar">
    <h1 class="area-title">인박스</h1>
  </div>
  <section class="group" id="inbox-list">
    {% if slices %}
      <div class="panel">
        {% for slice in slices %}{% include "web/partials/_inbox_row.html" %}{% endfor %}
      </div>
    {% else %}
      <div class="empty muted">인박스 클린</div>
    {% endif %}
  </section>
{% endblock %}
