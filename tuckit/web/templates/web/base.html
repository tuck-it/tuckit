{% load static web_extras %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}tuckit{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'web/tokens.brand.css' %}">
  <link rel="stylesheet" href="{% static 'web/tokens.product.css' %}">
  <link rel="stylesheet" href="{% static 'web/base.css' %}">
  <link rel="stylesheet" href="{% static 'web/app.css' %}">
  <script>
    /* Apply any saved theme before first paint so there's no flash of the
       wrong theme. Absent a saved choice, the brand tokens fall back to
       prefers-color-scheme. */
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.dataset.theme = saved;
      }
      if (localStorage.getItem("sidebar-collapsed") === "1") {
        document.documentElement.classList.add("sidebar-collapsed");
      }
    })();
  </script>
  <!-- command_palette.js defines the commandPalette() global; it must load
       before Alpine so the function exists when Alpine walks the DOM (Alpine
       auto-starts synchronously the moment its deferred script runs). -->
  <script defer src="{% static 'web/command_palette.js' %}"></script>
  <script defer src="{% static 'web/vendor/alpine.min.js' %}"></script>
  <script src="{% static 'web/vendor/htmx.min.js' %}"></script>
  <script src="{% static 'web/vendor/sortable.min.js' %}"></script>
  <script>
    /* htmx 2.x skips swapping on 204 by default; this app relies on 204 +
       hx-swap to remove/empty elements (e.g. inbox row triage), so opt back in.
       Elements that want no swap still say hx-swap="none" explicitly. */
    htmx.config.responseHandling.unshift({code: "204", swap: true});
  </script>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      x-data="{cap: false, menu: false, pal: false, trapFocus(e){ if(!this.menu) return; const f=[...this.$refs.sidebarWrap.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select,textarea')].filter(el=>el.offsetParent!==null); if(!f.length) return; const first=f[0], last=f[f.length-1]; if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); } else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); } }}"
      x-on:keydown.window="if (!cap && $event.key === 'c' && !['INPUT','TEXTAREA'].includes($event.target.tagName)) { cap = true; $nextTick(() => $refs.captureInput && $refs.captureInput.focus()) }"
      x-on:keydown.cmd.k.window.prevent="if (!cap) pal = true"
      x-on:keydown.ctrl.k.window.prevent="if (!cap) pal = true">
  <header class="topbar-mobile">
    <button class="topbar-btn" type="button" aria-label="Open navigation menu" :aria-expanded="menu" aria-controls="app-sidebar"
            x-ref="menuToggle"
            x-on:click="menu = true; $nextTick(() => $refs.sidebarWrap.querySelector('a[href],button')?.focus())">{% icon "menu" %}</button>
    <span class="topbar-brand">tuckit</span>
    <button class="topbar-btn" type="button" aria-label="Quick capture"
            x-on:click="cap = true; $nextTick(() => $refs.captureInput && $refs.captureInput.focus())">{% icon "plus" %}</button>
  </header>
  <div class="app">
    <div class="menu-scrim" x-show="menu" x-cloak x-on:click="menu = false; $refs.menuToggle.focus()"></div>
    <div class="sidebar-wrap" id="app-sidebar" x-ref="sidebarWrap" :class="{'menu-open': menu}"
         x-on:keydown.escape.window="if (menu) { menu = false; $refs.menuToggle.focus() }"
         x-on:keydown.tab="trapFocus($event)">
      {% include "web/partials/_sidebar.html" %}
    </div>
    <main class="main">{% block main %}{% endblock %}</main>
  </div>
  <div id="panel" role="dialog" aria-modal="true" aria-labelledby="panel-title"
       {% if request.GET.slice.isdigit %}hx-get="{% wurl 'web:slice' request.GET.slice %}?panel=1" hx-trigger="load" hx-target="#panel"{% endif %}
       x-on:keydown.escape="$el.innerHTML.trim() && closePanel($el)"
       x-on:keydown.tab="trapPanel($event, $el)"></div>
  <div id="toast" class="toast" x-cloak></div>
  {% include "web/partials/_capture_modal.html" %}
  {% include "web/partials/_command_palette.html" %}
  <div id="member-modal" class="modal-overlay" role="dialog" aria-modal="true"
       x-on:click.self="closeMemberModal()"
       x-on:keydown.escape="$el.innerHTML.trim() && closeMemberModal()"
       x-on:keydown.tab="trapMemberModal($event, $el)"></div>
  <script>
    /* Settings-form save confirmation. Independent of the capture toast's
       OOB/Alpine mechanism above — replaces #toast with a plain element so it
       can't be left stuck mid-animation by that flow's `show` state. */
    function showToast(message, tone) {
      var old = document.getElementById("toast");
      var el = document.createElement("div");
      el.id = "toast";
      el.className = tone === "err" ? "toast toast-err" : "toast";
      el.textContent = message;
      old.replaceWith(el);
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function () { el.textContent = ""; }, 1800);
    }
    /* Sidebar collapse: desktop-only icon rail, persisted. The class lives on
       <html> so the head script can restore it before paint (no flash). */
    function toggleSidebar() {
      var on = document.documentElement.classList.toggle("sidebar-collapsed");
      localStorage.setItem("sidebar-collapsed", on ? "1" : "0");
    }
    /* Slide-over focus management. #panel persists; htmx swaps its innerHTML.
       Capture the opener before the swap, move focus in after it, restore on close. */
    function closePanel(el) {
      el.innerHTML = "";
      if (window.__panelOpener) { window.__panelOpener.focus(); window.__panelOpener = null; }
      var u = new URL(window.location.href);
      if (u.searchParams.has("slice")) {
        u.searchParams.delete("slice");
        history.pushState({}, "", u.pathname + (u.search ? u.search : "") + u.hash);
      }
    }
    /* Grow a textarea to fit its content — used by the seamless description editor
       so entering edit mode never jumps to a fixed-height box. */
    function autosize(el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; }
    function trapPanel(e, el) {
      if (!el.innerHTML.trim()) return;
      var f = Array.prototype.slice.call(
        el.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select,textarea')
      ).filter(function (x) { return x.offsetParent !== null; });
      if (!f.length) return;
      var first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
    /* Member/invite "Manage" modal — same opener-tracking/focus-trap shape as
       #panel above, kept separate (own opener var, own element) since a row
       action and a slice-detail panel could in principle both be mid-flow. */
    function closeMemberModal() {
      var el = document.getElementById("member-modal");
      el.innerHTML = "";
      if (window.__memberModalOpener) { window.__memberModalOpener.focus(); window.__memberModalOpener = null; }
    }
    function trapMemberModal(e, el) {
      if (!el.innerHTML.trim()) return;
      var f = Array.prototype.slice.call(
        el.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select,textarea')
      ).filter(function (x) { return x.offsetParent !== null; });
      if (!f.length) return;
      var first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
    document.body.addEventListener("htmx:beforeRequest", function (e) {
      if (e.detail.target && e.detail.target.id === "panel") { window.__panelOpener = e.detail.elt; }
      if (e.detail.target && e.detail.target.id === "member-modal") { window.__memberModalOpener = e.detail.elt; }
    });
    document.body.addEventListener("htmx:afterSwap", function (e) {
      if (e.target && e.target.id === "panel" && e.target.innerHTML.trim()) {
        var focusables = Array.prototype.slice.call(
          e.target.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select,textarea')
        ).filter(function (x) { return x.offsetParent !== null; });
        var target = e.target.querySelector('[aria-label="Close panel"]') || focusables[0];
        if (target) target.focus();
      }
      if (e.target && e.target.id === "member-modal" && e.target.innerHTML.trim()) {
        var mFocusables = Array.prototype.slice.call(
          e.target.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select,textarea')
        ).filter(function (x) { return x.offsetParent !== null; });
        if (mFocusables[0]) mFocusables[0].focus();
      }
    });
  </script>
</body>
</html>
