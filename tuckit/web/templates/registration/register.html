<!doctype html>
<html lang="en">
{% include "registration/_auth_head.html" with page_title="Create your account" %}
<body>
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">tuckit</div>
      <h1 class="auth-title">Create your account</h1>
      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
      <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="auth-field">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" name="email" value="{{ values.email }}" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="reg-org">Organization name</label>
          <input id="reg-org" name="org_name" value="{{ values.org_name }}" autocomplete="organization" required>
        </div>
        <div class="auth-field">
          <label for="reg-slug">Organization URL</label>
          <div class="slug-preview">app.tuckit.dev/<span id="slug-echo">{{ values.slug|default:"your-org" }}</span></div>
          <input id="reg-slug" name="slug" value="{{ values.slug }}" pattern="[a-z0-9](?:[a-z0-9-]*[a-z0-9])?" maxlength="32" required>
          <small id="slug-status" class="field-hint"></small>
        </div>
        <script>
        (function () {
          var name = document.getElementById('reg-org');
          var slug = document.getElementById('reg-slug');
          var echo = document.getElementById('slug-echo');
          var status = document.getElementById('slug-status');
          var edited = slug.value.length > 0;
          function slugify(s) {
            return s.toLowerCase().trim()
              .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 32);
          }
          function refreshEcho() { echo.textContent = slug.value || 'your-org'; }
          name.addEventListener('input', function () {
            if (!edited) { slug.value = slugify(name.value); refreshEcho(); check(); }
          });
          slug.addEventListener('input', function () { edited = true; refreshEcho(); check(); });
          var t;
          function check() {
            clearTimeout(t);
            t = setTimeout(function () {
              if (!slug.value) { status.textContent = ''; return; }
              fetch('/settings/check-slug?kind=org&slug=' + encodeURIComponent(slug.value))
                .then(function (r) { return r.json(); })
                .then(function (d) {
                  status.textContent = d.available ? '사용 가능' : (d.error || '사용 불가');
                  status.className = 'field-hint ' + (d.available ? 'ok' : 'err');
                });
            }, 250);
          }
        })();
        </script>
        <div class="auth-field">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" name="password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="button button-primary">Create account</button>
      </form>
    </div>
  </main>
</body>
</html>
